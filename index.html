<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
padding:20px;
}

h1{
text-align:center;
color:#ff7a00;
margin-bottom:20px;
text-shadow:0 0 10px #ff7a00;
}

h2{
color:#ff7a00;
margin:20px auto 10px auto;
width:680px;
max-width:100%;
font-size:18px;
text-align:left;
}

#searchBar{
width:880px;
max-width:100%;
display:block;
margin:0 auto 25px auto;
padding:12px;
background:#111;
border:1px solid #ff7a00;
color:#fff;
border-radius:8px;
font-size:14px;
}

.bloco-regiao{
margin-bottom:25px;
}

.lista-regiao{
display:grid;
grid-template-columns:repeat(3, 220px);
justify-content:center;
gap:10px;
}

.btn-condominio{
padding:8px 10px;
font-size:13px;
background:#111;
border:1px solid #ff7a00;
color:#fff;
border-radius:6px;
cursor:pointer;
transition:.2s;
}

.btn-condominio:hover{
background:#ff7a00;
color:#000;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
overflow:auto;
padding:20px;
z-index:999;
}

.popup-content{
max-width:700px;
margin:auto;
}

.grid{
display:flex;
flex-direction:column;
gap:20px;
}

.card{
background:#111;
padding:12px;
border-radius:10px;
border:1px solid #ff7a00;
}

.card img{
width:100%;
max-height:450px;
object-fit:contain;
border-radius:8px;
display:block;
}

.textbox{
background:#000;
padding:15px;
border-radius:8px;
border:1px solid #ff7a00;
white-space:pre-wrap;
font-size:14px;
line-height:1.5;
margin-top:10px;
}

.button-group{
display:flex;
justify-content:flex-end;
gap:8px;
margin-top:10px;
margin-bottom:10px;
}

.actionBtn{
padding:6px 10px;
font-size:12px;
border:none;
background:#ff7a00;
color:#000;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

.closeBtn{
position:fixed;
top:25px;
right:45px;
background:#ff7a00;
color:#000;
border:none;
padding:12px 16px;
border-radius:6px;
cursor:pointer;
font-size:18px;
font-weight:bold;
z-index:10000;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:#ff7a00;
color:#000;
padding:10px 15px;
border-radius:8px;
font-size:13px;
font-weight:bold;
opacity:0;
transition:.3s;
z-index:9999;
}

.toast.show{
opacity:1;
}

@media(max-width:768px){
.popup-content{
max-width:100%;
}
}
</style>
</head>

/* ==========================
FUNÇÕES DE BUSCA
========================== */

function buscarImagem(nome){
  for(let img in imagens){
    if(imagens[img].includes(nome)){
      return img;
    }
  }
  return null;
}

function buscarTexto(nome){
  for(let grupo in textos){
    if(textos[grupo].conds.includes(nome)){
      return textos[grupo].texto;
    }
  }
  return null;
}

function buscarPromocoes(nome){

  if(promoAmazon3499Globo.includes(nome)){
    return [
      promocoes.promo_amazon3499,
      promocoes.promo_globo
    ];
  }

  if(promoAmazonGlobo.includes(nome)){
    return [
      promocoes.promo_amazon,
      promocoes.promo_globo
    ];
  }

  return [];
}

/* ==========================
UTILIDADES
========================== */

function mostrarToast(msg){
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },3000);
}

function copiarTexto(texto){
  navigator.clipboard.writeText(texto)
  .then(()=>{
    mostrarToast("Texto copiado!");
  })
  .catch(()=>{
    mostrarToast("Erro ao copiar texto.");
  });
}

async function copiarImagem(src){
  try{

    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = src;

    img.onload = async function(){

      const canvas = document.createElement("canvas");
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);

      canvas.toBlob(async (blob)=>{

        try{

          await navigator.clipboard.write([
            new ClipboardItem({
              "image/png": blob
            })
          ]);

          mostrarToast("Imagem copiada!");

        }catch(err){
          console.error(err);
          mostrarToast("Erro ao copiar imagem.");
        }

      }, "image/png");

    };

    img.onerror = function(err){
      console.error(err);
      mostrarToast("Erro ao carregar imagem.");
    };

  }catch(err){
    console.error(err);
    mostrarToast("Erro ao copiar imagem.");
  }
}

function fecharPopup(){
  const popup = document.getElementById("popup");

  popup.style.display = "none";
  document.getElementById("popupContent").innerHTML = "";
}


/* ==========================
ABRIR CONDOMÍNIO
========================== */

function abrirCondominio(nome){

  const imagem = buscarImagem(nome);
  const texto = buscarTexto(nome);
  const promos = buscarPromocoes(nome);

  let html = `<h2>${nome}</h2><div class="grid">`;

  /* IMAGEM PRINCIPAL */
  if(imagem){

    html += `
      <div class="card">

        <div class="button-group">
          <button class="actionBtn"
            onclick="copiarImagem('${imagem}')">
            Copiar Imagem
          </button>
        </div>

        <img src="${imagem}" alt="${nome}">

      </div>
    `;
  }

  /* TEXTO PRINCIPAL */
  if(texto){

    html += `
      <div class="card">

        <div class="button-group">
          <button class="actionBtn"
            onclick='copiarTexto(${JSON.stringify(texto)})'>
            Copiar Texto
          </button>
        </div>

        <div class="textbox">
          ${texto}
        </div>

      </div>
    `;
  }

  /* PROMOÇÕES */
  promos.forEach(promo=>{

    html += `
      <div class="card">

        <div class="button-group">
          <button class="actionBtn"
            onclick="copiarImagem('${promo.imagem}')">
            Copiar Imagem
          </button>
        </div>

        <img src="${promo.imagem}" alt="Promoção">

        <div class="button-group">
          <button class="actionBtn"
            onclick='copiarTexto(${JSON.stringify(promo.texto)})'>
            Copiar Texto
          </button>
        </div>

        <div class="textbox">
          ${promo.texto}
        </div>

      </div>
    `;

  });

  html += `</div>`;

  document.getElementById("popupContent").innerHTML = html;
  document.getElementById("popup").style.display = "block";
}

/* ==========================
RENDERIZAÇÃO DOS CONDOMÍNIOS
========================== */

function renderCondominios(filtro=""){

  const container = document.getElementById("listaCondominios");
  container.innerHTML = "";

  for(const regiao in regioes){

    const filtrados = regioes[regiao]
.sort((a,b)=>a.localeCompare(b))
.filter(cond =>
      cond.toLowerCase().includes(filtro.toLowerCase())
    );

    if(filtrados.length === 0) continue;

    const bloco = document.createElement("div");
    bloco.className = "bloco-regiao";

    const titulo = document.createElement("h2");
    titulo.textContent = regiao;

    bloco.appendChild(titulo);

    const lista = document.createElement("div");
    lista.className = "lista-regiao";

    filtrados.forEach(cond=>{

      const btn = document.createElement("button");
      btn.className = "btn-condominio";
      btn.textContent = cond;

      btn.onclick = ()=>{
        abrirCondominio(cond);
      };

      lista.appendChild(btn);

    });

    bloco.appendChild(lista);
    container.appendChild(bloco);

  }

}

document.getElementById("searchBar").addEventListener("input", function(){
